        #gameCanvas { 
    display: block; 
    width: 100vw; 
    height: 100vh;

    top: 0; /* ✅ ADDED */
    left: 0; /* ✅ ADDED */

#starfield {
    position: fixed;
    top: 0;
    left: 0;

}

.star {
    position: absolute;
    background: white;
    border-radius: 50%;

}

@keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
}
        
        #hud { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; z-index: 100; background: rgba(0, 0, 0, 0.8); padding: 15px 30px; border-radius: 15px; backdrop-filter: blur(10px); border: 2px solid rgba(0, 212, 255, 0.3); }

        #question-display { position: fixed; top: 120px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.9); border: 3px solid #00d4ff; padding: 15px 30px; border-radius: 15px; color: white; font-size: 20px; font-weight: 600; text-align: center; max-width: 70%; z-index: 100; box-shadow: 0 15px 50px rgba(0, 212, 255, 0.5); animation: slideDown 0.5s; line-height: 1.4; }

        #instructions { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255, 255, 255, 0.9); font-size: 16px; text-align: center; z-index: 100; background: rgba(0, 0, 0, 0.6); padding: 15px 30px; border-radius: 10px; border: 1px solid rgba(0, 212, 255, 0.3); }

        @keyframes countdownPulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } }
        
        .hidden { display: none !important; }
        
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; z-index: 200; text-align: center; }
        .loading-spinner { display: inline-block; width: 50px; height: 50px; border: 5px solid rgba(0, 212, 255, 0.3); border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }

    <script>
        // ✨ CREATE ANIMATED STARS
        function createStarfield() {
            const starfield = document.getElementById('starfield');
            const starCount = 150;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Random position
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                // Random size (1-3px)
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                // Random twinkle speed (2-5 seconds)
                const duration = Math.random() * 3 + 2;
                star.style.animationDuration = duration + 's';
                
                // Random delay for staggered effect
                star.style.animationDelay = Math.random() * 3 + 's';
                
                starfield.appendChild(star);
            }
        }
        
        // Initialize stars immediately
        createStarfield();
    </script>

function createCityBuildings() {
    const buildingTypes = [
        { width: 4, height: 12, depth: 4, color: 0x1a2332 },
        { width: 3, height: 18, depth: 3, color: 0x2a3344 },
        { width: 5, height: 10, depth: 5, color: 0x3a4455 },
        { width: 3.5, height: 15, depth: 3.5, color: 0x2a3a4a }
    ];

    for (let side = -1; side <= 1; side += 2) {
        let zPosition = -80;
        
        while (zPosition < 100) {
            const buildingData = buildingTypes[Math.floor(Math.random() * buildingTypes.length)];
            
            const buildingGeometry = new THREE.BoxGeometry(buildingData.width, buildingData.height, buildingData.depth);
            const buildingMaterial = new THREE.MeshStandardMaterial({ 
                color: buildingData.color, 
                roughness: 0.8,
                metalness: 0.1
                // ✅ NO transparency properties - fully solid
            });
            
            const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
            building.position.set(side * (9 + Math.random() * 3), buildingData.height / 2, zPosition);
            building.castShadow = true;
            building.receiveShadow = true;
            scene.add(building);
            cityBuildings.push(building);

            // 💡 Add windows on BOTH front AND back sides
            const windowsPerFloor = 3;
            const floors = Math.floor(buildingData.height / 2);
            
            for (let floor = 1; floor < floors; floor++) {
                for (let win = 0; win < windowsPerFloor; win++) {
                    if (Math.random() > 0.3) {
                        const windowGeometry = new THREE.BoxGeometry(0.4, 0.6, 0.1);
                        const windowColor = Math.random() > 0.5 ? 0xffee88 : 0x00ddff;
                        const windowMaterial = new THREE.MeshBasicMaterial({ 
                            color: windowColor,
                            emissive: windowColor,
                            emissiveIntensity: 0.8
                        });
                        
                        const xOffset = (win - 1) * 1.2;
                        const yOffset = floor * 2 - buildingData.height / 2 + 1;
                        
                        // ✅ Front side window (facing road)
                        const windowFront = new THREE.Mesh(windowGeometry, windowMaterial);
                        windowFront.position.set(
                            building.position.x + xOffset,
                            yOffset,
                            building.position.z + (buildingData.depth / 2 + 0.05)
                        );
                        scene.add(windowFront);
                        cityBuildings.push(windowFront);
                        
                        // ✅ Back side window (opposite side)
                        const windowBack = new THREE.Mesh(windowGeometry, windowMaterial.clone());
                        windowBack.position.set(
                            building.position.x + xOffset,
                            yOffset,
                            building.position.z - (buildingData.depth / 2 + 0.05)
                        );
                        scene.add(windowBack);
                        cityBuildings.push(windowBack);
                    }
                }
            }

            // 🔴 Rooftop lights
            if (Math.random() > 0.5) {
                const roofLightGeometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
                const roofLightMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0xff0000,
                    emissive: 0xff0000,
                    emissiveIntensity: 1
                });
                const roofLight = new THREE.Mesh(roofLightGeometry, roofLightMaterial);
                roofLight.position.set(building.position.x, buildingData.height + 0.5, building.position.z);
                scene.add(roofLight);
                cityBuildings.push(roofLight);
            }

            zPosition += buildingData.depth + Math.random() * 8 + 5;
        }
    }
}

        function movePlayer() {
            if (!player) return;
            const targetX = lanes[currentLane];
            const startX = player.position.x;
            const duration = 200;
            const startTime = Date.now();

            function animateMove() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                player.position.x = startX + (targetX - startX) * eased;
                if (progress < 1) requestAnimationFrame(animateMove);
            }
            animateMove();
        }

        function startCountdown() {
            const countdownEl = document.getElementById('countdown');
            countdownEl.classList.remove('hidden');
            let count = 3;
            const interval = setInterval(() => {
                if (count > 0) countdownEl.textContent = count;
                else countdownEl.textContent = 'GO!';
                count--;
                if (count < -1) {
                    clearInterval(interval);
                    countdownEl.classList.add('hidden');
                    startQuiz();
                }
            }, 1000);
        }

        function startQuiz() {
            isPlaying = true;

function clearAllBlocks() {
    answerBlocks.forEach(item => { 
        if (item.block) scene.remove(item.block);
        if (item.sprite) scene.remove(item.sprite);
        if (item.light) scene.remove(item.light);
    });
    answerBlocks = [];
    console.log('🧹 All answer blocks cleared');

function showQuestion() {
    
    if (isGameEnded || currentQuestionIndex >= quizData.questions.length) return;
    clearAllBlocks();

    hasAnsweredCurrentQuestion = false;
    console.log('🔓 Ready for new answer - Question', currentQuestionIndex + 1);
    
    clearAllBlocks();

    const question = quizData.questions[currentQuestionIndex];
    document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
    document.getElementById('question-display').textContent = question.question;
    document.getElementById('question-display').classList.remove('hidden');

    let options = question.options.map((opt, idx) => ({ text: opt, isCorrect: idx === question.correctAnswer }));
    for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
    }

    options.forEach((option, i) => {
        // ✅ INVISIBLE COLLISION BOX
        const baseGeometry = new THREE.BoxGeometry(3.5, 0.1, 4);
        const baseMaterial = new THREE.MeshBasicMaterial({ 
            transparent: true,
            opacity: 0
        });
        const base = new THREE.Mesh(baseGeometry, baseMaterial);
        base.position.set(lanes[i], 0.05, -60);
        scene.add(base);

        // ✅ SMART TEXT WRAPPING for long answers
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.width = 1024;
        canvas.height = 768; // ✅ Taller canvas for more lines
        
        // Transparent background
        context.clearRect(0, 0, canvas.width, canvas.height);
        
        // ✅ ADAPTIVE FONT SIZE based on text length
        let fontSize = 175;
        if (option.text.length > 30) fontSize = 75; // Medium length
        if (option.text.length > 50) fontSize = 60; // Long text
        if (option.text.length > 80) fontSize = 50; // Very long text
        
        context.font = `bold ${fontSize}px Arial`;
        context.fillStyle = '#ffffff';
        context.textAlign = 'center';
        context.textBaseline = 'middle';
        context.shadowColor = '#05fa22';
        context.shadowBlur = 20;
        
        // ✅ SMART WORD WRAPPING - Breaks into multiple lines
        const maxWidth = 850; // Max width per line
        const lineHeight = fontSize + 30; // Space between lines
        const words = option.text.split(' ');
        let lines = [];
        let currentLine = '';
        
        words.forEach(word => {
            const testLine = currentLine + word + ' ';
            const metrics = context.measureText(testLine);
            
            if (metrics.width > maxWidth && currentLine.length > 0) {
                lines.push(currentLine.trim());
                currentLine = word + ' ';
            } else {
                currentLine = testLine;
            }
        });
        if (currentLine.length > 0) {
            lines.push(currentLine.trim());
        }
        
        // ✅ CENTER TEXT VERTICALLY (even with multiple lines)
        const totalHeight = lines.length * lineHeight;
        const startY = (canvas.height / 2) - (totalHeight / 2) + (lineHeight / 2);
        
        // ✅ DRAW EACH LINE with triple glow
        lines.forEach((line, idx) => {
            const y = startY + (idx * lineHeight);
            
            // Draw 3 times for mega-glow
            context.fillText(line, canvas.width / 2, y);
            context.fillText(line, canvas.width / 2, y);
            context.fillText(line, canvas.width / 2, y);
        });

        const texture = new THREE.CanvasTexture(canvas);
        texture.needsUpdate = true;
        
        const spriteMaterial = new THREE.SpriteMaterial({ 
            map: texture,
            transparent: true
        });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.position.set(lanes[i], 2.5, -60);
        
        // ✅ ADAPTIVE SIZE - Taller for more lines
        const spriteHeight = 3 + (lines.length * 0.5); // Grows with line count
        sprite.scale.set(7, spriteHeight, 1);
        scene.add(sprite);

        // ✅ GLOWING LIGHT
        const light = new THREE.PointLight(0x00d4ff, 3, 15);
        light.position.set(lanes[i], 2.5, -60);
        scene.add(light);

        // ✅ Store parts
        const blockData = {
            block: base,
            sprite: sprite,
            light: light
        };
        
        base.userData = { isCorrect: option.isCorrect, text: option.text };
        answerBlocks.push(blockData);
    });
}

function handleAnswer(isCorrect, answer) {
    // ✅ CHECK: Already answered this question?
    if (hasAnsweredCurrentQuestion) {
        console.log('⚠️ Already answered this question, ignoring extra input');
        return; // Exit early, don't process
    }
    
    // ✅ LOCK: Prevent multiple answers
    hasAnsweredCurrentQuestion = true;
    console.log('✅ Answer locked for question', currentQuestionIndex + 1);
    
    userAnswers[currentQuestionIndex] = answer;
    
    if (isCorrect) {
        correctAnswers++;
        document.getElementById('score').textContent = correctAnswers;
        scene.background = new THREE.Color(0x00ff88);
        setTimeout(() => scene.background = new THREE.Color(0x0a0e27), 300);
    } else {
        scene.background = new THREE.Color(0xff4b2b);
        setTimeout(() => scene.background = new THREE.Color(0x0a0e27), 300);
    }

    document.getElementById('question-display').classList.add('hidden');
    currentQuestionIndex++;

    if (currentQuestionIndex >= quizData.questions.length) {
        isGameEnded = true;
        clearAllBlocks();
        setTimeout(() => endGame(), 1500);
    }
}

async function endGame() {
    if (isGameEnded === 'completed') return;
    isGameEnded = 'completed';
    isPlaying = false;
    
    const totalQuestions = quizData.questions.length;
    const percentage = Math.round((correctAnswers / totalQuestions) * 100);
    
    // ✅ NEW COIN SYSTEM (Much less coins!)
    const baseCoins = correctAnswers * 3;  // ✅ CHANGED: 10 to 3 coins per correct answer
    let bonusCoins = 0;
    
    if (correctAnswers === totalQuestions) {
        bonusCoins = 20; // ✅ CHANGED: 100 to 20 (perfect score bonus)
    } else if (correctAnswers > 0) {
        bonusCoins = 5;  // ✅ CHANGED: 25 to 5 (participation bonus)
    }
    
    const totalCoins = baseCoins + bonusCoins;
    
    // ✅ NEW: Calculate XP earned (20 XP per correct answer)
    const xpEarned = correctAnswers * 20;

    try {
        const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
        const userData = userDoc.data();
        
        // ✅ Calculate new XP and level
        const currentXp = userData.xp || 0;
        const currentLevel = userData.level || 1;
        const currentMaxXp = userData.maxXp || 100;
        
        let newXp = currentXp + xpEarned;
        let newLevel = currentLevel;
        let newMaxXp = currentMaxXp;
        let levelUpCoins = 0;
        
        // ✅ Level up logic (Max level 20)
        while (newXp >= newMaxXp && newLevel < 20) {
            newXp -= newMaxXp;
            newLevel++;
            newMaxXp = Math.floor(100 * Math.pow(1.2, newLevel - 1)); // XP scales by 20% each level
            levelUpCoins += newLevel * 10; // ✅ Bonus coins per level (10, 20, 30, etc.)
        }
        
        // Cap XP at max level
        if (newLevel >= 20) {
            newXp = 0;
            newLevel = 20;
        }
        
        const totalCoinsWithBonus = totalCoins + levelUpCoins;
        
        // ✅ Update user data
        await updateDoc(doc(db, 'users', currentUser.uid), { 
            coins: increment(totalCoinsWithBonus),
            xp: newXp,
            level: newLevel,
            maxXp: newMaxXp
        });
        
        const now = new Date();
        await addDoc(collection(db, 'quizResults'), {
            userId: currentUser.uid, 
            userName: userData.fullName,
            quizId: quizData.id, 
            quizTitle: quizData.title, 
            quizCode: quizData.code,
            professorId: quizData.professorId, 
            score: correctAnswers,
            totalQuestions: totalQuestions, 
            percentage: percentage, 
            coinsEarned: totalCoinsWithBonus,
            xpEarned: xpEarned, // ✅ NEW: Track XP earned
            levelAfter: newLevel, // ✅ NEW: Track level after quiz
            completedAt: now.toISOString(), 
            completedAtTimestamp: now.getTime()
        });
        
        await updateDoc(doc(db, 'quizzes', quizData.id), { 
            completedBy: arrayUnion(currentUser.uid) 
        });
        
        // ✅ Pass level up info to results
        showResults(correctAnswers, totalQuestions, percentage, totalCoinsWithBonus, levelUpCoins > 0, newLevel);
        
    } catch (error) {
        console.error('Error saving results:', error);
        alert('Failed to save results.');
    }
}

    function showResults(correct, total, percentage, coins, didLevelUp, newLevel) {
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('instructions').classList.add('hidden');
    
    let icon = '🏆', title = 'Quiz Complete!', message = '';
    if (correct === total) { 
        icon = '🌟'; 
        title = 'PERFECT SCORE!'; 
        message = 'Flawless victory!'; 
    }
    else if (percentage >= 80) { 
        icon = '🎯'; 
        title = 'Excellent!'; 
        message = 'Outstanding!'; 
    }
    else if (percentage >= 60) { 
        icon = '👍'; 
        title = 'Good Job!'; 
        message = 'Keep practicing!'; 
    }
    else { 
        icon = '💪'; 
        title = 'Keep Trying!'; 
        message = 'Every attempt makes you stronger!'; 
    }
    
    // ✅ Add level up notification
    if (didLevelUp) {
        message += `\n🎉 LEVEL UP! You're now Level ${newLevel}!`;
    }
    
    document.getElementById('resultIcon').textContent = icon;
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultScore').textContent = `${correct}/${total} (${percentage}%)`;
    document.getElementById('resultCoins').innerHTML = `<i class='bx bxs-coin-stack'></i> +${coins} Coins`;
    document.getElementById('resultMessage').textContent = message;
    document.getElementById('result-modal').style.display = 'block';
}
